version: "3.8"

services:
  db:
    image: postgres:15
    container_name: hamburgueria_db
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: hamburgueria_backend
    ports:
      - "3333:3333"
    depends_on:
      - db
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: hamburgueria_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    restart: always

volumes:
  postgres_data: